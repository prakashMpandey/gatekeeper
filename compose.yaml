services:

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  
 
  mongo:
    image: mongo:latest
    ports:
    - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: qwerty
    volumes:
    - mongo_data:/data/db
  mongo-express:
    image: mongo-express
    ports:
    - 8081:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin 
      ME_CONFIG_MONGODB_ADMINPASSWORD: qwerty
      ME_CONFIG_MONGODB_URL: mongodb://admin:qwerty@mongo:27017/
 
  apigateway:
      build: "./apigateway"
      container_name: "apigateway"
      ports:
        - "4000:4000"
      env_file:
        - .env.prod

  
  auth:
    build: "./auth"
    container_name: "auth-service"
    ports:
      - "3000:3000"
    env_file:
      - .env.prod
    depends_on:
      - redis
      - mongo
    
  
  orders:
    build: "./orders"
    container_name: "order-service"
    ports:
      - "3010:3010"
    env_file:
      - .env.prod
    depends_on:
      - redis
      - mongo


volumes:
  redis_data:
  mongo_data:
